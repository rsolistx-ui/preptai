<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PREPT AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <header class="header">
      <div class="logo">PREPT <span>AI</span></div>
      <div class="tagline">Job application copilot</div>
    </header>

    <!-- Detected job banner -->
    <div id="detected-banner" class="detected-banner hidden">
      <div class="det-label"><span class="dot"></span> Job detected</div>
      <div class="det-title" id="det-title">—</div>
      <div class="det-company" id="det-company">—</div>
    </div>

    <!-- Primary CTA -->
    <div class="actions" id="primary-actions">
      <button class="btn btn-gold" id="btn-sidepanel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Open Full Side Panel
      </button>
      <button class="btn btn-optimize hidden" id="btn-optimize">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Optimize My Resume
      </button>
      <button class="btn btn-secondary hidden" id="btn-coach">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Prep for Interview
      </button>
    </div>

    <div class="divider"></div>

    <!-- Manual input -->
    <div class="manual">
      <div class="section-label">Paste a job description</div>
      <textarea id="manual-jd" placeholder="Paste job description here…" rows="4" maxlength="12000"></textarea>
      <div class="row2">
        <input type="text" id="manual-title" placeholder="Job title">
        <input type="text" id="manual-company" placeholder="Company">
      </div>
      <div class="actions">
        <button class="btn btn-optimize" id="btn-man-opt" disabled>Optimize Resume</button>
        <button class="btn btn-secondary" id="btn-man-coach" disabled>Prep for Interview</button>
      </div>
    </div>

    <footer class="footer">
      Works on LinkedIn, Indeed, Glassdoor + 12 more
      <a href="https://preptai.app" target="_blank">preptai.app ↗</a>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
