<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREPT AI — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070e;color:#edeaf7;font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;top:-20%;left:20%;width:600px;height:500px;background:radial-gradient(ellipse,rgba(123,109,244,0.06) 0%,transparent 65%);pointer-events:none}
.card{position:relative;z-index:1;background:#0f0f1c;border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{font-size:24px;font-weight:900;color:#e6c668;letter-spacing:-0.5px;text-align:center;margin-bottom:6px}
.tagline{font-size:13px;color:#8c89a6;text-align:center;margin-bottom:28px}
.tabs{display:flex;background:#171728;border-radius:8px;padding:3px;margin-bottom:24px;gap:3px}
.tab{flex:1;padding:9px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#8c89a6;transition:all 0.2s;text-align:center}
.tab.on{background:#e6c668;color:#07070e}
.google-btn{width:100%;padding:12px;background:#ffffff;color:#1a1a2e;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px)}
.google-icon{width:18px;height:18px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#4d4a66;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}
.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#4d4a66;margin-bottom:6px}
input{width:100%;background:#171728;border:1px solid rgba(255,255,255,0.09);color:#edeaf7;font-family:'Outfit',sans-serif;font-size:14px;padding:12px 14px;border-radius:8px;outline:none;transition:border-color 0.2s}
input:focus{border-color:#7b6df4}
input::placeholder{color:#4d4a66}
.submit-btn{width:100%;padding:13px;background:#e6c668;color:#07070e;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:6px;letter-spacing:0.3px}
.submit-btn:hover{background:#f5dfa0;transform:translateY(-1px)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg{padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.5;margin-top:12px;display:none}
.msg.error{background:rgba(239,95,95,0.1);border:1px solid rgba(239,95,95,0.2);color:#ef5f5f}
.msg.success{background:rgba(69,222,122,0.1);border:1px solid rgba(69,222,122,0.2);color:#45de7a}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:#8c89a6}
.back-link a{color:#e6c668;text-decoration:none}
.back-link a:hover{text-decoration:underline}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(7,7,14,0.3);border-top-color:#07070e;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
.loading-white{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.free-note{font-size:12px;color:#4d4a66;text-align:center;margin-top:12px;line-height:1.6}
</style>
</head>
<body>

<div class="card">
  <div class="logo">PREPT AI</div>
  <div class="tagline">Get past the algorithm. Get to the interview.</div>

  <div class="tabs">
    <button class="tab on" id="tabLogin" onclick="switchTab('login')">Log in</button>
    <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign up free</button>
  </div>

  <!-- GOOGLE BUTTON -->
  <button class="google-btn" id="googleBtn" onclick="handleGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">or continue with email</div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@email.com" onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Log in →</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signupEmail" placeholder="you@email.com" onkeydown="if(event.key==='Enter')handleSignup()"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password (min 8 characters)" onkeydown="if(event.key==='Enter')handleSignup()"/>
    </div>
    <button class="submit-btn" id="signupBtn" onclick="handleSignup()">Create free account →</button>
    <div class="msg" id="signupMsg"></div>
    <div class="free-note">
      Free account includes 3 interview questions and 1 resume analysis.<br>
      Upgrade to Pro anytime for unlimited access.
    </div>
  </div>

  <div class="back-link">
    <a href="/">← Back to preptai.co</a>
    &nbsp;·&nbsp;
    <a href="https://billing.stripe.com/p/login/bJe4gAdlkddX92gfLycbC00" target="_blank">Manage billing</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── REPLACE THESE TWO VALUES ───────────────────────────────────────
const SUPABASE_URL = 'https://lfxfwhitegsjeowlcvqk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeGZ3aGl0ZWdzamVvd2xjdnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODM3ODMsImV4cCI6MjA4OTg1OTc4M30.f67zZLrSbaLbTgWZtvx2AIr4aCGVRxuynEFm1_CKvWs';
// ──────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('on', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('on', tab === 'signup');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

// --- GOOGLE SIGN IN ---
async function handleGoogle() {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-white"></span>Connecting to Google...';
  btn.style.background = '#333';
  btn.style.color = '#fff';

  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/prept_v2.html'
    }
  });

  if (error) {
    btn.disabled = false;
    btn.style.background = '#ffffff';
    btn.style.color = '#1a1a2e';
    btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google`;
    alert('Google sign in failed. Please try email instead.');
  }
  // If no error, Google redirects automatically — no code needed here
}

// --- EMAIL LOGIN ---
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showMsg('loginMsg', 'Please enter your email and password.', 'error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Logging in...';

  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const { data: sub } = await db.from('subscribers').select('plan').eq('email', email).single();
    const plan = sub?.plan || 'free';
    sessionStorage.setItem('preptai_user', JSON.stringify({ email, plan }));

    showMsg('loginMsg', 'Welcome back! Redirecting...', 'success');
    setTimeout(() => { window.location.href = '/prept_v2.html'; }, 1000);

  } catch (err) {
    showMsg('loginMsg', 'Incorrect email or password. Please try again.', 'error');
    btn.disabled = false;
    btn.innerHTML = 'Log in →';
  }
}

// --- EMAIL SIGNUP ---
async function handleSignup() {
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;

  if (!email || !password) { showMsg('signupMsg', 'Please enter your email and password.', 'error'); return; }
  if (password.length < 8) { showMsg('signupMsg', 'Password must be at least 8 characters.', 'error'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Creating account...';

  try {
    const { data, error } = await db.auth.signUp({ email, password });
    if (error) throw error;

    await db.from('subscribers').upsert({ email, plan: 'free' });
    sessionStorage.setItem('preptai_user', JSON.stringify({ email, plan: 'free' }));

    showMsg('signupMsg', 'Account created! Welcome to PREPT AI. Redirecting...', 'success');
    setTimeout(() => { window.location.href = '/prept_v2.html'; }, 1500);

  } catch (err) {
    let msg = 'Something went wrong. Please try again.';
    if (err.message?.includes('already registered')) msg = 'An account with this email already exists. Try logging in.';
    showMsg('signupMsg', msg, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Create free account →';
  }
}

// Check if already logged in — skip login page
db.auth.getSession().then(({ data }) => {
  if (data.session) { window.location.href = '/prept_v2.html'; }
});
</script>
</body>
</html>
